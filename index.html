<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PokeAPI Explorer</title>
    <link rel="stylesheet" href="./style.css">
</head>
<body>
    <main class="app-shell">
        <header class="app-header">
            <h1>PokeAPI Explorer</h1>
            <p>Search for a Pokemon to view full details and evolution chain.</p>
            <div class="search-row">
                <input type="text" id="pokemonInput" placeholder="e.g. pikachu">
                <button id="searchButton" type="button">Search</button>
            </div>
        </header>

        <section id="pokemonInfo" class="content-panel"></section>
    </main>

    <script src="./app.js"></script>
</body>
</html>
